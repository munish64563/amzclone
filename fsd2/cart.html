<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body bgcolor="#AABBCC">
    <header class="navbar">
        <h2 class="logo" onclick="window.location.href='index.html'">AmzClone</h2>
        <div class="nav-right"><a href="index.html">Back to Shop</a></div>
    </header>

    <main class="container">
        <h2 class="section-title">Shopping Cart</h2>
        <div id="cart-items" style="background: white; padding: 20px; border-radius: 8px;"></div>
        <h2 style="text-align: right; margin-top: 20px;">Total: ₹<span id="cart-total">0</span></h2>
    </main>

    <script src="script.js"></script>
    <script>
        const cartContainer = document.getElementById('cart-items');
        const cartTotalDisplay = document.getElementById('cart-total');

        function changeQuantity(index, amount) {
            cart[index].quantity += amount;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            saveCart();
            renderCart();
            updateCartCount();
        }

        function renderCart() {
            if (cart.length === 0) {
                cartContainer.innerHTML = "<p>Your cart is empty.</p>";
                cartTotalDisplay.innerText = "0";
                return;
            }
            let total = 0;
            cartContainer.innerHTML = cart.map((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <div style="flex:2"><h3>${item.name}</h3><p>₹${item.price.toLocaleString('en-IN')}</p></div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQuantity(${index}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
                        </div>
                        <div style="flex:1; text-align:right;"><b>₹${itemTotal.toLocaleString('en-IN')}</b></div>
                    </div>`;
            }).join('');
            cartTotalDisplay.innerText = total.toLocaleString('en-IN');
        }
        renderCart();
    </script>
</body>
</html>
